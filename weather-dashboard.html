<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1200px;
            width: 100%;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            animation: fadeIn 0.8s ease;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            animation: fadeIn 0.8s ease 0.2s both;
        }

        .search-box input {
            flex: 1;
            padding: 15px 20px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        .search-box input:focus {
            outline: none;
            background: white;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            transform: translateY(-2px);
        }

        .search-box button {
            padding: 15px 30px;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 32px rgba(255, 107, 107, 0.3);
        }

        .search-box button:hover {
            background: #ff5252;
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(255, 107, 107, 0.4);
        }

        .search-box button:active {
            transform: translateY(0);
        }

        .weather-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            animation: fadeIn 0.8s ease 0.4s both;
        }

        .weather-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .weather-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.2);
        }

        .current-weather {
            grid-column: 1 / -1;
        }

        .city-name {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 10px;
            color: #333;
        }

        .temperature {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .temp-value {
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .weather-icon {
            font-size: 4rem;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .weather-description {
            font-size: 1.2rem;
            color: #666;
            text-transform: capitalize;
            margin-bottom: 20px;
        }

        .weather-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .detail-item {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .detail-item:hover {
            transform: scale(1.05);
        }

        .detail-label {
            font-size: 0.9rem;
            opacity: 0.9;
            margin-bottom: 5px;
        }

        .detail-value {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .forecast-container {
            grid-column: 1 / -1;
        }

        .forecast-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #333;
            margin-bottom: 15px;
        }

        .forecast-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
        }

        .forecast-item {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .forecast-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
        }

        .forecast-day {
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 0.95rem;
        }

        .forecast-icon {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .forecast-temp {
            font-size: 1rem;
            font-weight: 700;
        }

        .error-message {
            background: #ff6b6b;
            color: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            animation: slideIn 0.3s ease;
            grid-column: 1 / -1;
        }

        .loading {
            text-align: center;
            color: white;
            font-size: 1.2rem;
            padding: 40px;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideIn {
            from {
                transform: translateX(-100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .location-btn {
            padding: 15px 30px;
            background: #4ecdc4;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 32px rgba(78, 205, 196, 0.3);
        }

        .location-btn:hover {
            background: #45b8ae;
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(78, 205, 196, 0.4);
        }

        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 20px;
        }

        .unit-toggle {
            display: flex;
            gap: 5px;
            background: white;
            padding: 5px;
            border-radius: 8px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .unit-toggle button {
            padding: 8px 15px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            border-radius: 6px;
        }

        .unit-toggle button.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8rem;
            }

            .temp-value {
                font-size: 2.5rem;
            }

            .weather-icon {
                font-size: 3rem;
            }

            .search-box {
                flex-direction: column;
            }

            .search-box input,
            .search-box button {
                width: 100%;
            }

            .controls {
                flex-direction: column;
            }

            .controls > * {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-cloud-sun"></i> Weather Dashboard</h1>
            <p>Get real-time weather information for any location</p>
        </div>

        <div class="controls">
            <div class="search-box" id="searchBox">
                <input 
                    type="text" 
                    id="cityInput" 
                    placeholder="Enter city name..." 
                    autocomplete="off"
                >
                <button onclick="searchWeather()"><i class="fas fa-search"></i> Search</button>
                <button class="location-btn" onclick="getLocationWeather()" title="Use your location">
                    <i class="fas fa-map-marker-alt"></i> My Location
                </button>
            </div>
            <div class="unit-toggle">
                <button class="active" onclick="setUnit('C')">°C</button>
                <button onclick="setUnit('F')">°F</button>
            </div>
        </div>

        <div id="weatherContainer" class="weather-grid">
            <div class="loading">
                <i class="fas fa-spinner fa-spin"></i> Loading weather data...
            </div>
        </div>
    </div>

    <script>
        const API_KEY = 'b6fd43b89eb8efe3161a7d3ce3b12142'; // OpenWeatherMap free API key
        let currentUnit = 'C';
        let currentCity = 'London';

        // Event listener for Enter key
        document.getElementById('cityInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchWeather();
            }
        });

        // Initialize
        window.addEventListener('load', () => {
            fetchWeather(currentCity);
        });

        function searchWeather() {
            const city = document.getElementById('cityInput').value.trim();
            if (city) {
                currentCity = city;
                fetchWeather(city);
                document.getElementById('cityInput').value = '';
            }
        }

        function getLocationWeather() {
            if (navigator.geolocation) {
                showLoading();
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const { latitude, longitude } = position.coords;
                        fetchWeatherByCoords(latitude, longitude);
                    },
                    (error) => {
                        showError('Could not get your location. Please enable location access.');
                    }
                );
            } else {
                showError('Geolocation is not supported by your browser.');
            }
        }

        function fetchWeatherByCoords(lat, lon) {
            const url = `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric`;
            
            fetch(url)
                .then(response => {
                    if (!response.ok) throw new Error('Weather not found');
                    return response.json();
                })
                .then(data => {
                    currentCity = data.name;
                    displayWeather(data);
                    fetchForecast(data.name);
                })
                .catch(error => {
                    showError('Failed to fetch weather data');
                });
        }

        function fetchWeather(city) {
            showLoading();
            const url = `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric`;
            
            fetch(url)
                .then(response => {
                    if (!response.ok) throw new Error('City not found');
                    return response.json();
                })
                .then(data => {
                    displayWeather(data);
                    fetchForecast(city);
                })
                .catch(error => {
                    showError('City not found. Please check the spelling and try again.');
                });
        }

        function fetchForecast(city) {
            const url = `https://api.openweathermap.org/data/2.5/forecast?q=${city}&appid=${API_KEY}&units=metric`;
            
            fetch(url)
                .then(response => {
                    if (!response.ok) throw new Error('Forecast not found');
                    return response.json();
                })
                .then(data => {
                    displayForecast(data.list);
                })
                .catch(error => {
                    console.log('Could not fetch forecast');
                });
        }

        function displayWeather(data) {
            const container = document.getElementById('weatherContainer');
            const temp = currentUnit === 'C' ? data.main.temp : (data.main.temp * 9/5) + 32;
            const feelsLike = currentUnit === 'C' ? data.main.feels_like : (data.main.feels_like * 9/5) + 32;
            const tempUnit = currentUnit === 'C' ? '°C' : '°F';

            const weatherIcon = getWeatherIcon(data.weather[0].main);
            
            const currentWeatherHTML = `
                <div class="weather-card current-weather">
                    <div class="city-name">${data.name}, ${data.sys.country}</div>
                    <div class="temperature">
                        <div class="temp-value">${Math.round(temp)}${tempUnit}</div>
                        <div class="weather-icon">${weatherIcon}</div>
                    </div>
                    <div class="weather-description">${data.weather[0].description}</div>
                    <div class="weather-details">
                        <div class="detail-item">
                            <div class="detail-label">Feels Like</div>
                            <div class="detail-value">${Math.round(feelsLike)}${tempUnit}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Humidity</div>
                            <div class="detail-value">${data.main.humidity}%</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Pressure</div>
                            <div class="detail-value">${data.main.pressure} hPa</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Wind Speed</div>
                            <div class="detail-value">${(data.wind.speed * 3.6).toFixed(1)} km/h</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Visibility</div>
                            <div class="detail-value">${(data.visibility / 1000).toFixed(1)} km</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">UV Index</div>
                            <div class="detail-value">${data.clouds.all}%</div>
                        </div>
                    </div>
                </div>
            `;
            
            container.innerHTML = currentWeatherHTML;
        }

        function displayForecast(forecastData) {
            const container = document.getElementById('weatherContainer');
            const forecastContainer = document.createElement('div');
            forecastContainer.className = 'weather-card forecast-container';
            
            // Get forecast for next 5 days (every 24 hours)
            const dailyForecasts = {};
            forecastData.forEach(item => {
                const date = new Date(item.dt * 1000);
                const day = date.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
                if (!dailyForecasts[day]) {
                    dailyForecasts[day] = item;
                }
            });

            let forecastHTML = '<div class="forecast-title"><i class="fas fa-calendar-days"></i> 5-Day Forecast</div>';
            forecastHTML += '<div class="forecast-grid">';

            Object.values(dailyForecasts).slice(1, 6).forEach(item => {
                const temp = currentUnit === 'C' ? item.main.temp : (item.main.temp * 9/5) + 32;
                const tempUnit = currentUnit === 'C' ? '°C' : '°F';
                const date = new Date(item.dt * 1000);
                const day = date.toLocaleDateString('en-US', { weekday: 'short' });
                const icon = getWeatherIcon(item.weather[0].main);

                forecastHTML += `
                    <div class="forecast-item">
                        <div class="forecast-day">${day}</div>
                        <div class="forecast-icon">${icon}</div>
                        <div class="forecast-temp">${Math.round(temp)}${tempUnit}</div>
                    </div>
                `;
            });

            forecastHTML += '</div>';
            forecastContainer.innerHTML = forecastHTML;
            container.appendChild(forecastContainer);
        }

        function getWeatherIcon(weather) {
            const iconMap = {
                'Clear': '<i class="fas fa-sun" style="color: #FFD700;"></i>',
                'Clouds': '<i class="fas fa-cloud" style="color: #B0C4DE;"></i>',
                'Rain': '<i class="fas fa-cloud-rain" style="color: #4682B4;"></i>',
                'Snow': '<i class="fas fa-snowflake" style="color: #87CEEB;"></i>',
                'Thunderstorm': '<i class="fas fa-bolt" style="color: #FFD700;"></i>',
                'Drizzle': '<i class="fas fa-cloud-rain-heavy" style="color: #5F9EA0;"></i>',
                'Mist': '<i class="fas fa-smog" style="color: #A9A9A9;"></i>',
                'Smoke': '<i class="fas fa-smog" style="color: #808080;"></i>',
                'Haze': '<i class="fas fa-smog" style="color: #D3D3D3;"></i>',
                'Dust': '<i class="fas fa-wind" style="color: #CD853F;"></i>',
                'Fog': '<i class="fas fa-smog" style="color: #C0C0C0;"></i>',
                'Sand': '<i class="fas fa-wind" style="color: #DEB887;"></i>',
                'Ash': '<i class="fas fa-smog" style="color: #696969;"></i>',
                'Squall': '<i class="fas fa-wind" style="color: #778899;"></i>',
                'Tornado': '<i class="fas fa-tornado" style="color: #8B4513;"></i>'
            };
            return iconMap[weather] || '<i class="fas fa-cloud" style="color: #B0C4DE;"></i>';
        }

        function setUnit(unit) {
            currentUnit = unit;
            // Update active button
            document.querySelectorAll('.unit-toggle button').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // Refresh display with new unit
            fetchWeather(currentCity);
        }

        function showLoading() {
            const container = document.getElementById('weatherContainer');
            container.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i> Loading weather data...</div>';
        }

        function showError(message) {
            const container = document.getElementById('weatherContainer');
            container.innerHTML = `<div class="error-message"><i class="fas fa-exclamation-circle"></i> ${message}</div>`;
        }
    </script>
</body>
</html>
